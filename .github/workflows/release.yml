name: Release

on:
  workflow_dispatch:
    inputs:
      version_tag:
        description: "Release version tag, for example v0.1.0"
        required: true
        default: "0.1.0"

permissions:
  contents: write

jobs:
  release:
    name: Build release zip
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Validate release inputs
        shell: bash
        run: |
          set -euo pipefail

          if [[ ! "${{ inputs.version_tag }}" =~ ^v?[0-9]+\.[0-9]+\.[0-9]+([.-][0-9A-Za-z.-]+)?$ ]]; then
            echo "version_tag must look like v0.1.0 or 0.1.0"
            exit 1
          fi

          if [[ ! -d "1A-12SlotToolbeltExpansion" ]]; then
            echo "Expected 1A-12SlotToolbeltExpansion to exist."
            exit 1
          fi

          if [[ ! -f "1A-12SlotToolbeltExpansion/ModInfo.xml" ]]; then
            echo "Expected 1A-12SlotToolbeltExpansion/ModInfo.xml to exist."
            exit 1
          fi

          if [[ ! -f "1A-12SlotToolbeltExpansion/ToolbeltExpansion.dll" ]]; then
            echo "Expected 1A-12SlotToolbeltExpansion/ToolbeltExpansion.dll to exist."
            exit 1
          fi

      - name: Create mod zip
        shell: bash
        run: |
          set -euo pipefail

          mkdir -p artifacts
          zip_name="ToolbeltExpansion-${{ inputs.version_tag }}.zip"
          zip_name="${zip_name//\//-}"

          zip -r "artifacts/${zip_name}" "1A-12SlotToolbeltExpansion"
          echo "ZIP_PATH=artifacts/${zip_name}" >> "$GITHUB_ENV"

      - name: Generate changelog
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require("fs");
            const { execFileSync } = require("child_process");

            const versionTag = "${{ inputs.version_tag }}";
            let previousTag = "";

            try {
              const latest = await github.rest.repos.getLatestRelease({
                owner: context.repo.owner,
                repo: context.repo.repo,
              });
              previousTag = latest.data.tag_name;
            } catch (error) {
              if (error.status !== 404) throw error;
            }

            const range = previousTag ? `${previousTag}..HEAD` : "HEAD";
            const rawLog = execFileSync("git", [
              "log",
              range,
              "--pretty=format:%H%x1f%s%x1f%b%x1e",
            ], { encoding: "utf8" });

            const groups = [
              ["feat", "Features"],
              ["fix", "Fixes"],
              ["perf", "Performance"],
              ["refactor", "Refactors"],
              ["docs", "Documentation"],
              ["test", "Tests"],
              ["build", "Build"],
              ["ci", "CI"],
              ["chore", "Chores"],
              ["style", "Style"],
              ["revert", "Reverts"],
              ["other", "Other Changes"],
            ];

            const changes = Object.fromEntries(groups.map(([key]) => [key, []]));
            const breaking = [];
            const conventionalPattern = /^(?<type>[a-z]+)(\([^)]+\))?(?<bang>!)?:\s*(?<description>.+)$/;

            for (const record of rawLog.split("\x1e").filter(Boolean)) {
              const [sha, subject, body = ""] = record.trim().split("\x1f");
              if (!sha || !subject) continue;

              const match = subject.match(conventionalPattern);
              const type = match?.groups?.type ?? "other";
              const group = changes[type] ? type : "other";
              const description = match?.groups?.description ?? subject;
              const shortSha = sha.slice(0, 7);

              changes[group].push(`- ${description} (${shortSha})`);

              if (match?.groups?.bang || body.includes("BREAKING CHANGE:")) {
                breaking.push(`- ${description} (${shortSha})`);
              }
            }

            const lines = [
              `# ${versionTag}`,
              "",
              previousTag
                ? `Changes since ${previousTag}.`
                : "Initial release changelog from all repository commits.",
              "",
            ];

            if (breaking.length > 0) {
              lines.push("## Breaking Changes", "", ...breaking, "");
            }

            for (const [key, title] of groups) {
              if (changes[key].length === 0) continue;
              lines.push(`## ${title}`, "", ...changes[key], "");
            }

            if (Object.values(changes).every((items) => items.length === 0)) {
              lines.push("No commits found since the previous release.", "");
            }

            fs.writeFileSync("CHANGELOG.md", lines.join("\n"));

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ inputs.version_tag }}
          name: Toolbelt Expansion ${{ inputs.version_tag }}
          body_path: CHANGELOG.md
          files: ${{ env.ZIP_PATH }}
          fail_on_unmatched_files: true
